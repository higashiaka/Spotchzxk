system-sell:
  pressure:
    enabled: false
    max-orders-per-tick: 1
    execution-chance-percent: 60

    start-gain-min-percent: 200
    start-gain-max-percent: 300
    stop-gain-min-percent: 150
    stop-gain-max-percent: 190

    weak:
      quantity-min: 30
      quantity-max: 100
      interval-min-seconds: 8
      interval-max-seconds: 20

    medium:
      quantity-min: 60
      quantity-max: 200
      interval-min-seconds: 5
      interval-max-seconds: 10

    strong:
      quantity-min: 80
      quantity-max: 250
      interval-min-seconds: 3
      interval-max-seconds: 12

    extreme:
      quantity-min: 100
      quantity-max: 300
      interval-min-seconds: 3
      interval-max-seconds: 18

    max-quantity-per-order: 2000
    daily-sell-limit-min: 5000
    daily-sell-limit-max: 8000
    max-consecutive-sell-min: 1
    max-consecutive-sell-max: 8
    cooldown-min-seconds: 90
    cooldown-max-seconds: 120

    state-ttl-min-hours: 1
    state-ttl-max-hours: 3

    daily-reference-ratio-min-percent: 40
    daily-reference-ratio-max-percent: 70

spring:
  application:
    name: spotchzxk

  task:
    scheduling:
      pool:
        size: 4

  security:
    user:
      name: disabled
      password: disabled

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:spotchzxk}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000

  jackson:
    serialization:
      write-dates-as-timestamps: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 3

server:
  port: ${PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

app:
  cors-origin: ${CORS_ORIGIN:http://localhost:5173}
  admin-api-key: ${ADMIN_API_KEY:}
  firebase:
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:serviceAccountKey.json}

bot:
  activity:
    enabled: ${BOT_ACTIVITY_ENABLED:false}
    min-delay-seconds: ${BOT_ACTIVITY_MIN_DELAY_SECONDS:20}
    max-delay-seconds: ${BOT_ACTIVITY_MAX_DELAY_SECONDS:45}
    max-orders-per-tick: ${BOT_ACTIVITY_MAX_ORDERS_PER_TICK:1}
    user-count: ${BOT_ACTIVITY_USER_COUNT:20}
    max-quantity: ${BOT_ACTIVITY_MAX_QUANTITY:12}
    buy-chance-percent: ${BOT_ACTIVITY_BUY_CHANCE_PERCENT:60}
    small-quantity-max: ${BOT_ACTIVITY_SMALL_QUANTITY_MAX:5}
    large-quantity-chance-percent: ${BOT_ACTIVITY_LARGE_QUANTITY_CHANCE_PERCENT:15}
    low-balance-threshold-percent: ${BOT_ACTIVITY_LOW_BALANCE_THRESHOLD_PERCENT:30}
    critical-balance-threshold-percent: ${BOT_ACTIVITY_CRITICAL_BALANCE_THRESHOLD_PERCENT:10}
    low-balance-buy-chance-percent: ${BOT_ACTIVITY_LOW_BALANCE_BUY_CHANCE_PERCENT:25}
    low-balance-quantity-percent: ${BOT_ACTIVITY_LOW_BALANCE_QUANTITY_PERCENT:50}
    high-holding-quantity: ${BOT_ACTIVITY_HIGH_HOLDING_QUANTITY:30}
    high-holding-buy-chance-percent: ${BOT_ACTIVITY_HIGH_HOLDING_BUY_CHANCE_PERCENT:20}
    asset-reset-threshold-percent: ${BOT_ACTIVITY_ASSET_RESET_THRESHOLD_PERCENT:15}