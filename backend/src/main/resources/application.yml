spring:
  application:
    name: spotchzxk

  security:
    user:
      name: disabled
      password: disabled

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:spotchzxk}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    serialization:
      write-dates-as-timestamps: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 3

server:
  port: ${PORT:8080}

app:
  cors-origin: ${CORS_ORIGIN:http://localhost:5173}
  admin-api-key: ${ADMIN_API_KEY:}
  firebase:
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:serviceAccountKey.json}
