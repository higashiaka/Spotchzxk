<!-- Spotchzxk favicon: 스트리머 주식 거래소 — 상승 차트 + 라이브 가격 포인트 -->
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
  </defs>

  <!-- 녹색 그라디언트 배경 -->
  <rect width="48" height="48" rx="11" fill="url(#bg)"/>

  <!-- 차트 영역 채우기 (라인 아래) -->
  <path
    d="M5,37 L13,29 L20,32 L28,19 L35,23 L42,13 L42,44 L5,44 Z"
    fill="url(#areaFill)"/>

  <!-- 상승 주가 라인 -->
  <polyline
    points="5,37 13,29 20,32 28,19 35,23 42,13"
    stroke="white" stroke-width="2.8" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 현재가 라이브 포인트 (밝은 녹색 글로우 + 흰 중심) -->
  <circle cx="42" cy="13" r="5.5" fill="#4ade80" opacity="0.35"/>
  <circle cx="42" cy="13" r="3.8" fill="#4ade80"/>
  <circle cx="42" cy="13" r="1.8" fill="white"/>
</svg>
